<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>GitHub 热榜 - 趋势追踪</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #e2e8f0; --sub: #94a3b8; --muted: #64748b; --dim: #475569;
    --orange: #f97316; --red: #ef4444; --green: #34d399;
    --blue: #60a5fa; --purple: #a78bfa; --pink: #ec4899;
  }
  body {
    font-family: -apple-system, "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-tap-highlight-color: transparent;
  }

  /* ─── Header ─── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,23,42,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 14px 16px 0; border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .header h1 { font-size: 20px; background: linear-gradient(135deg, var(--orange), var(--red), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .subtitle { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--sub); border-radius: 10px;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: all .2s;
  }
  .icon-btn:active { background: var(--border); }
  .icon-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* ─── Search ─── */
  .search-bar {
    display: none; padding: 0 0 10px;
  }
  .search-bar.show { display: flex; gap: 8px; }
  .search-input {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    padding: 8px 14px; font-size: 14px; outline: none;
  }
  .search-input::placeholder { color: var(--dim); }
  .search-input:focus { border-color: var(--orange); }
  .search-cancel {
    background: none; border: none; color: var(--sub);
    font-size: 13px; cursor: pointer; padding: 0 4px;
  }

  /* ─── Tabs ─── */
  .tabs {
    display: flex; gap: 3px; background: var(--card);
    border-radius: 11px; padding: 3px;
  }
  .tab-btn {
    flex: 1; text-align: center; padding: 7px 0; border-radius: 9px;
    font-size: 12px; font-weight: 500; color: var(--sub);
    cursor: pointer; transition: all .2s; border: none; background: transparent;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--orange), var(--red));
    color: #fff; font-weight: 700;
    box-shadow: 0 2px 8px rgba(249,115,22,0.3);
  }

  /* ─── Language Filter ─── */
  .lang-bar { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 10px 16px; }
  .lang-bar::-webkit-scrollbar { display: none; }
  .lang-btn {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 16px;
    padding: 4px 10px; font-size: 11px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .lang-btn.active { background: var(--border); color: var(--text); font-weight: 600; }

  /* ─── Stats ─── */
  .stats-bar { display: flex; justify-content: space-around; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .stat-item { text-align: center; }
  .stat-num { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--orange), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* ─── Content ─── */
  .content { padding: 8px 12px 120px; }

  /* ─── Card ─── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; margin-bottom: 8px;
    cursor: pointer; transition: all .15s; position: relative; overflow: hidden;
  }
  .card:active { transform: scale(0.98); background: #253347; }
  .card-rank {
    position: absolute; top: 0; left: 0; min-width: 24px; text-align: center;
    padding: 3px 7px; font-size: 10px; font-weight: 800;
    border-radius: 0 0 8px 0; color: #fff;
  }
  .rank-1 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); }
  .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); }
  .rank-n { background: var(--border); color: var(--sub); }
  .card-main { margin-left: 28px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .card-name { font-size: 13px; font-weight: 700; color: #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
  .card-delta { font-size: 12px; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 2px; }
  .card-desc { font-size: 11px; color: var(--sub); line-height: 1.5; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
  .card-meta .lang-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 2px; vertical-align: middle; }
  .card-meta span { display: flex; align-items: center; gap: 2px; white-space: nowrap; }
  .card-topics { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .topic-tag { font-size: 9px; padding: 1px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); }

  /* ─── Detail Panel (slide-up) ─── */
  .detail-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 500; opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .detail-overlay.show { opacity: 1; pointer-events: auto; }
  .detail-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-radius: 16px 16px 0 0;
    z-index: 501; transform: translateY(100%);
    transition: transform .3s ease-out;
    max-height: 85vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .detail-panel.show { transform: translateY(0); }
  .detail-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
  .detail-header { padding: 14px 16px 10px; }
  .detail-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .detail-subtitle { font-size: 12px; color: var(--sub); line-height: 1.5; }
  .detail-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 12px; }
  .detail-stat {
    background: var(--bg); border-radius: 10px; padding: 10px; text-align: center;
  }
  .detail-stat-num { font-size: 16px; font-weight: 800; }
  .detail-stat-num.up { color: var(--green); }
  .detail-stat-num.neutral { color: var(--blue); }
  .detail-stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .detail-chart { padding: 0 16px 12px; }
  .detail-chart-title { font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 8px; }
  .chart-container { background: var(--bg); border-radius: 10px; padding: 12px; height: 140px; position: relative; overflow: hidden; }
  .chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 100%; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 2px; transition: height .5s ease-out; }
  .chart-bar-label { font-size: 8px; color: var(--dim); }
  .detail-links { display: flex; gap: 8px; padding: 0 16px 20px; }
  .detail-link {
    flex: 1; text-align: center; padding: 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s;
    text-decoration: none; display: block;
  }
  .detail-link:active { background: var(--border); }
  .detail-link.primary { background: linear-gradient(135deg, var(--orange), var(--red)); border-color: transparent; color: #fff; }

  /* ─── Skeleton ─── */
  .skeleton { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  .skeleton-card { background: var(--card); border-radius: 12px; padding: 12px 12px 12px 40px; margin-bottom: 8px; }
  .skeleton-line { background: var(--border); border-radius: 5px; height: 10px; margin-bottom: 7px; }
  .skeleton-line.s { width: 35%; } .skeleton-line.m { width: 65%; } .skeleton-line.l { width: 90%; }

  /* ─── Empty ─── */
  .empty { text-align: center; padding: 50px 20px; color: var(--dim); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* ─── Toast ─── */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--border); color: var(--text);
    padding: 8px 18px; border-radius: 10px;
    font-size: 12px; opacity: 0; transition: all .3s; z-index: 600; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Install Banner ─── */
  .install-banner {
    display: none; position: fixed; bottom: 16px; left: 12px; right: 12px;
    background: linear-gradient(135deg, var(--card), var(--border));
    border: 1px solid var(--dim); border-radius: 12px;
    padding: 12px; z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .install-banner.show { display: flex; align-items: center; gap: 10px; }
  .install-banner p { flex: 1; font-size: 12px; color: #cbd5e1; }
  .install-banner .btn-install {
    background: linear-gradient(135deg, var(--orange), var(--red));
    color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
  }
  .install-banner .btn-close { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 2px; }

  /* ─── Back to top ─── */
  .back-top {
    position: fixed; bottom: 80px; right: 16px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border);
    color: var(--sub); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: all .3s; z-index: 100;
  }
  .back-top.show { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>🔥 GitHub 热榜</h1>
      <div class="subtitle" id="updateTime">加载中...</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnSearch" onclick="toggleSearch()">🔍</button>
      <button class="icon-btn" id="btnTheme" onclick="toggleSort()">⬇️</button>
      <button class="icon-btn" id="refreshBtn" onclick="loadData()">🔄</button>
    </div>
  </div>
  <div class="search-bar" id="searchBar">
    <input class="search-input" id="searchInput" placeholder="搜索仓库名、描述、语言..." oninput="onSearch()">
    <button class="search-cancel" onclick="toggleSearch()">取消</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="daily">📈 日增</button>
    <button class="tab-btn" data-tab="weekly">📊 周增</button>
    <button class="tab-btn" data-tab="monthly">🔥 月增</button>
    <button class="tab-btn" data-tab="new">🆕 新项目</button>
  </div>
</div>

<!-- Language Filter -->
<div class="lang-bar" id="langBar"></div>

<!-- Stats -->
<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-item"><div class="stat-num" id="statTotal">-</div><div class="stat-label">追踪仓库</div></div>
  <div class="stat-item"><div class="stat-num" id="statUpdated">-</div><div class="stat-label">更新时间</div></div>
  <div class="stat-item"><div class="stat-num" id="statTopLang">-</div><div class="stat-label">最热语言</div></div>
</div>

<!-- Content -->
<div class="content" id="content">
  <div class="skeleton-card skeleton"><div class="skeleton-line s"></div><div class="skeleton-line l"></div><div class="skeleton-line m"></div></div>
  <div class="skeleton-card skeleton"><div class="skeleton-line s"></div><div class="skeleton-line l"></div><div class="skeleton-line m"></div></div>
  <div class="skeleton-card skeleton"><div class="skeleton-line s"></div><div class="skeleton-line l"></div><div class="skeleton-line m"></div></div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-handle"></div>
  <div class="detail-header">
    <div class="detail-title" id="detailTitle">-</div>
    <div class="detail-subtitle" id="detailDesc">-</div>
  </div>
  <div class="detail-stats" id="detailStats"></div>
  <div class="detail-chart">
    <div class="detail-chart-title">📊 增长趋势</div>
    <div class="chart-container" id="chartContainer"></div>
  </div>
  <div class="detail-links" id="detailLinks"></div>
</div>

<!-- Back to top -->
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- Install -->
<div class="install-banner" id="installBanner">
  <span style="font-size:24px">📲</span>
  <p>添加到主屏幕，像 APP 一样使用</p>
  <button class="btn-install" id="btnInstall">安装</button>
  <button class="btn-close" onclick="el('installBanner').classList.remove('show')">✕</button>
</div>

<div class="toast" id="toast"></div>

<script>
const el = id => document.getElementById(id);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const fmtN = n => { if (n == null) return '-'; if (n >= 10000) return (n/10000).toFixed(1) + 'w'; if (n >= 1000) return (n/1000).toFixed(1) + 'k'; return String(n); };
const fmtD = n => { if (n == null) return ''; const p = n > 0 ? '+' : ''; if (n >= 10000) return p + (n/10000).toFixed(1) + 'w'; if (n >= 1000) return p + (n/1000).toFixed(1) + 'k'; return p + n; };
const ago = iso => { if (!iso) return ''; const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000); if (m < 60) return m + '分钟前'; const h = Math.floor(m/60); if (h < 24) return h + '小时前'; return Math.floor(h/24) + '天前'; };
const toast = m => { const t = el('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); };

let data = null, currentTab = 'daily', currentLang = '', searchQuery = '', sortAsc = false, deferredPrompt = null;

// ─── PWA ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; el('installBanner').classList.add('show'); });
el('btnInstall').addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') toast('🎉 安装成功！'); deferredPrompt = null; el('installBanner').classList.remove('show'); } });

// ─── Scroll ──────────────────────────────────────────────────
window.addEventListener('scroll', () => { el('backTop').classList.toggle('show', window.scrollY > 400); });

// ─── Tabs ────────────────────────────────────────────────────
el('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn'); if (!btn) return;
  el('tabs').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentTab = btn.dataset.tab; render();
});

// ─── Language ────────────────────────────────────────────────
el('langBar').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn'); if (!btn) return;
  el('langBar').querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentLang = btn.dataset.lang; render();
});

// ─── Search ──────────────────────────────────────────────────
function toggleSearch() {
  const bar = el('searchBar'); bar.classList.toggle('show');
  el('btnSearch').classList.toggle('active');
  if (bar.classList.contains('show')) { el('searchInput').focus(); } else { searchQuery = ''; el('searchInput').value = ''; render(); }
}
function onSearch() { searchQuery = el('searchInput').value.trim().toLowerCase(); render(); }

// ─── Sort toggle ─────────────────────────────────────────────
function toggleSort() { sortAsc = !sortAsc; el('btnTheme').textContent = sortAsc ? '⬆️' : '⬇️'; toast(sortAsc ? '升序排列' : '降序排列'); render(); }

// ─── Card click ──────────────────────────────────────────────
el('content').addEventListener('click', e => {
  const card = e.target.closest('.card'); if (!card) return;
  const name = card.dataset.name;
  const repo = getRepoByName(name);
  if (repo) showDetail(repo);
});

function getRepoByName(name) {
  if (!data) return null;
  const all = [...(data.daily||[]), ...(data.weekly||[]), ...(data.monthly||[]), ...(data.new||[])];
  return all.find(r => r.n === name);
}

// ─── Detail Panel ────────────────────────────────────────────
function showDetail(r) {
  el('detailTitle').textContent = r.n;
  el('detailDesc').textContent = r.d || '暂无描述';

  const deltas = [
    { label: '日增', val: r.s1, icon: '📈' },
    { label: '周增', val: r.s7, icon: '📊' },
    { label: '月增', val: r.s30, icon: '🔥' },
  ];
  el('detailStats').innerHTML = `
    <div class="detail-stat"><div class="detail-stat-num neutral">${fmtN(r.s)}</div><div class="detail-stat-label">⭐ 总 Star</div></div>
    <div class="detail-stat"><div class="detail-stat-num neutral">${fmtN(r.f)}</div><div class="detail-stat-label">🍴 Fork</div></div>
    ${deltas.map(d => `<div class="detail-stat"><div class="detail-stat-num ${d.val != null && d.val > 0 ? 'up' : 'neutral'}">${d.val != null ? fmtD(d.val) : '-'}</div><div class="detail-stat-label">${d.icon} ${d.label}</div></div>`).join('')}
    <div class="detail-stat"><div class="detail-stat-num neutral">${ago(r.pa) || '-'}</div><div class="detail-stat-label">🕐 最近推送</div></div>
  `;

  // Chart: show growth trend
  const chartData = [
    { label: '日增', value: r.s1 || 0 },
    { label: '周增', value: r.s7 || 0 },
    { label: '月增', value: r.s30 || 0 },
  ];
  const maxVal = Math.max(...chartData.map(d => Math.abs(d.value)), 1);
  el('chartContainer').innerHTML = `<div class="chart-bars">${chartData.map(d => {
    const h = Math.max(2, (Math.abs(d.value) / maxVal) * 100);
    const color = d.value > 0 ? 'var(--green)' : d.value < 0 ? 'var(--red)' : 'var(--dim)';
    return `<div class="chart-bar-wrap"><div class="chart-bar" style="height:${h}%;background:${color}"></div><div class="chart-bar-label">${d.label}</div></div>`;
  }).join('')}</div>`;

  // Links
  el('detailLinks').innerHTML = `
    <a class="detail-link" href="${esc(r.u)}" target="_blank">📂 GitHub</a>
    ${r.hp ? `<a class="detail-link primary" href="${esc(r.hp)}" target="_blank">🌐 官网</a>` : ''}
  `;

  el('detailOverlay').classList.add('show');
  el('detailPanel').classList.add('show');
}

function closeDetail() {
  el('detailOverlay').classList.remove('show');
  el('detailPanel').classList.remove('show');
}

// ─── Load Data ───────────────────────────────────────────────
async function loadData() {
  const btn = el('refreshBtn'); btn.classList.add('loading'); btn.textContent = '⏳';

  try {
    const cached = localStorage.getItem('gh_data');
    const cacheTime = localStorage.getItem('gh_data_time');
    if (cached && cacheTime && (Date.now() - cacheTime < 30 * 60 * 1000)) {
      data = JSON.parse(cached); render(); updateMeta();
    }

    const urls = ['data/summary.json', 'https://raw.githubusercontent.com/thisDy/github-trending/main/data/summary.json'];
    let fetched = null;
    for (const url of urls) {
      try { const resp = await fetch(url, { cache: 'no-cache' }); if (resp.ok) { fetched = await resp.json(); break; } } catch {}
    }

    if (fetched && fetched.daily && fetched.daily.length > 0) {
      data = fetched;
      localStorage.setItem('gh_data', JSON.stringify(data));
      localStorage.setItem('gh_data_time', Date.now().toString());
      render(); updateMeta(); toast('✅ 已更新');
    } else if (!cached) {
      el('content').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无数据<br><small>GitHub Actions 每天自动采集</small></p></div>';
    }
  } catch {
    if (localStorage.getItem('gh_data')) { data = JSON.parse(localStorage.getItem('gh_data')); render(); toast('📡 网络不佳'); }
    else el('content').innerHTML = '<div class="empty"><div class="empty-icon">😵</div><p>加载失败</p></div>';
  } finally { btn.classList.remove('loading'); btn.textContent = '🔄'; }
}

function updateMeta() {
  if (!data) return;
  el('statsBar').style.display = 'flex';
  el('statTotal').textContent = fmtN(data.total);
  el('statUpdated').textContent = ago(data.generated_at);
  el('statTopLang').textContent = (data.langs && data.langs[0]) || '-';
  const d = new Date(data.generated_at);
  const pad = n => String(n).padStart(2, '0');
  el('updateTime').textContent = `${data.date} · ${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if (data.langs && data.langs.length) {
    el('langBar').innerHTML = '<button class="lang-btn active" data-lang="">全部</button>' + data.langs.map(l => `<button class="lang-btn" data-lang="${esc(l)}">${esc(l)}</button>`).join('');
  }
}

// ─── Render ──────────────────────────────────────────────────
function render() {
  if (!data) return;
  const tabData = { daily: data.daily || [], weekly: data.weekly || [], monthly: data.monthly || [], new: data.new || [] };
  let repos = tabData[currentTab] || [];

  // Language filter
  if (currentLang) repos = repos.filter(r => r.l === currentLang);

  // Search filter
  if (searchQuery) {
    repos = repos.filter(r =>
      (r.n && r.n.toLowerCase().includes(searchQuery)) ||
      (r.d && r.d.toLowerCase().includes(searchQuery)) ||
      (r.l && r.l.toLowerCase().includes(searchQuery)) ||
      (r.t && r.t.some(t => t.toLowerCase().includes(searchQuery)))
    );
  }

  // Sort
  const deltaKey = { daily: 's1', weekly: 's7', monthly: 's30', new: 's' }[currentTab];
  if (sortAsc) repos = [...repos].sort((a, b) => (a[deltaKey] || 0) - (b[deltaKey] || 0));

  if (!repos.length) {
    el('content').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>没有${searchQuery ? '匹配的' : currentLang ? currentLang + ' ' : ''}项目</p></div>`;
    return;
  }

  el('content').innerHTML = repos.map((r, i) => {
    const rank = i + 1, rc = rank <= 3 ? `rank-${rank}` : 'rank-n';
    const isNew = currentTab === 'new';
    const delta = r[deltaKey];
    const lc = r.lc || 'var(--dim)';
    return `
      <div class="card" data-name="${esc(r.n)}">
        <div class="card-rank ${rc}">#${rank}</div>
        <div class="card-main">
          <div class="card-header">
            <div class="card-name">${esc(r.n)}</div>
            ${!isNew && delta != null ? `<div class="card-delta">⭐ ${fmtD(delta)}</div>` : ''}
            ${isNew ? `<div class="card-delta">🆕 ${fmtN(r.s)}</div>` : ''}
          </div>
          <div class="card-desc">${esc(r.d)}</div>
          <div class="card-meta">
            ${r.l ? `<span><span class="lang-dot" style="background:${esc(lc)}"></span>${esc(r.l)}</span>` : ''}
            <span>⭐ ${fmtN(r.s)}</span><span>🍴 ${fmtN(r.f)}</span>
            ${r.pa ? `<span>🕐 ${ago(r.pa)}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
