<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>GitHub 热榜 - 趋势追踪</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ─── Header ─── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,23,42,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid #1e293b;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 22px;
    background: linear-gradient(135deg, #f97316, #ef4444, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .subtitle { font-size: 11px; color: #64748b; margin-top: 2px; }
  .refresh-btn {
    background: #1e293b; border: 1px solid #334155;
    color: #94a3b8; border-radius: 10px;
    padding: 8px 14px; font-size: 13px;
    cursor: pointer; transition: all .2s;
  }
  .refresh-btn:active { background: #334155; color: #e2e8f0; }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* ─── Tab Bar ─── */
  .tabs {
    display: flex; gap: 4px;
    background: #1e293b; border-radius: 12px;
    padding: 4px; margin-bottom: 0;
  }
  .tab-btn {
    flex: 1; text-align: center;
    padding: 8px 0; border-radius: 9px;
    font-size: 13px; font-weight: 500;
    color: #94a3b8; cursor: pointer;
    transition: all .2s; border: none;
    background: transparent;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #f97316, #ef4444);
    color: #fff; font-weight: 700;
    box-shadow: 0 2px 8px rgba(249,115,22,0.3);
  }

  /* ─── Language Filter ─── */
  .lang-bar {
    display: flex; gap: 8px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 12px 20px;
    border-bottom: 1px solid #1e293b;
  }
  .lang-bar::-webkit-scrollbar { display: none; }
  .lang-btn {
    flex-shrink: 0;
    background: #1e293b; border: 1px solid #334155;
    color: #94a3b8; border-radius: 20px;
    padding: 5px 12px; font-size: 11px;
    cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .lang-btn.active {
    background: #334155; color: #e2e8f0;
    border-color: #475569; font-weight: 600;
  }

  /* ─── Stats Bar ─── */
  .stats-bar {
    display: flex; justify-content: space-around;
    padding: 12px 20px;
    border-bottom: 1px solid #1e293b;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, #f97316, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }

  /* ─── Content ─── */
  .content { padding: 8px 16px 100px; }

  /* ─── Card ─── */
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    overflow: hidden;
  }
  .card:active { transform: scale(0.98); background: #253347; }

  .card-rank {
    position: absolute; top: 0; left: 0;
    min-width: 28px; text-align: center;
    padding: 4px 8px;
    font-size: 11px; font-weight: 800;
    border-radius: 0 0 10px 0;
    color: #fff;
  }
  .rank-1 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); }
  .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); }
  .rank-n { background: #334155; color: #94a3b8; }

  .card-main { margin-left: 32px; }

  .card-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .card-name {
    font-size: 14px; font-weight: 700; color: #f1f5f9;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; max-width: 65%;
  }
  .card-delta {
    font-size: 13px; font-weight: 800;
    color: #34d399;
    display: flex; align-items: center; gap: 2px;
  }
  .card-delta.down { color: #f87171; }

  .card-desc {
    font-size: 12px; color: #94a3b8;
    line-height: 1.5; margin-bottom: 8px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .card-meta {
    display: flex; align-items: center;
    gap: 12px; font-size: 11px; color: #64748b;
  }
  .card-meta .lang-dot {
    width: 8px; height: 8px;
    border-radius: 50%; display: inline-block;
    margin-right: 3px; vertical-align: middle;
  }
  .card-meta span { display: flex; align-items: center; gap: 3px; }

  .card-topics {
    display: flex; gap: 5px; flex-wrap: wrap;
    margin-top: 6px;
  }
  .topic-tag {
    font-size: 9px; padding: 2px 7px;
    background: #0f172a; border: 1px solid #334155;
    border-radius: 10px; color: #64748b;
  }

  /* ─── Skeleton ─── */
  .skeleton { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  .skeleton-card {
    background: #1e293b; border-radius: 14px;
    padding: 14px 14px 14px 46px; margin-bottom: 10px;
  }
  .skeleton-line { background: #334155; border-radius: 6px; height: 12px; margin-bottom: 8px; }
  .skeleton-line.short { width: 40%; }
  .skeleton-line.med { width: 70%; }

  /* ─── Empty ─── */
  .empty { text-align: center; padding: 60px 20px; color: #475569; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ─── Toast ─── */
  .toast {
    position: fixed; top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #334155; color: #e2e8f0;
    padding: 10px 20px; border-radius: 10px;
    font-size: 13px; opacity: 0;
    transition: all .3s; z-index: 300;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Install Banner ─── */
  .install-banner {
    display: none;
    position: fixed; bottom: 20px; left: 16px; right: 16px;
    background: linear-gradient(135deg, #1e293b, #334155);
    border: 1px solid #475569;
    border-radius: 14px; padding: 14px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .install-banner.show { display: flex; align-items: center; gap: 12px; }
  .install-banner p { flex: 1; font-size: 13px; color: #cbd5e1; }
  .install-banner .btn-install {
    background: linear-gradient(135deg, #f97316, #ef4444);
    color: #fff; border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 13px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
  }
  .install-banner .btn-close {
    background: none; border: none;
    color: #64748b; font-size: 18px;
    cursor: pointer; padding: 4px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>🔥 GitHub 热榜</h1>
      <div class="subtitle" id="updateTime">加载中...</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">🔄 刷新</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="daily">📈 日增</button>
    <button class="tab-btn" data-tab="weekly">📊 周增</button>
    <button class="tab-btn" data-tab="monthly">🔥 月增</button>
    <button class="tab-btn" data-tab="new">🆕 新项目</button>
  </div>
</div>

<!-- Language Filter -->
<div class="lang-bar" id="langBar" style="display:none">
  <button class="lang-btn active" data-lang="">全部</button>
</div>

<!-- Stats -->
<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-item">
    <div class="stat-num" id="statTotal">-</div>
    <div class="stat-label">追踪仓库</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="statUpdated">-</div>
    <div class="stat-label">更新时间</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="statTopLang">-</div>
    <div class="stat-label">最热语言</div>
  </div>
</div>

<!-- Content -->
<div class="content" id="content">
  <div class="skeleton-card skeleton"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line med"></div></div>
  <div class="skeleton-card skeleton"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line med"></div></div>
  <div class="skeleton-card skeleton"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line med"></div></div>
</div>

<!-- Install -->
<div class="install-banner" id="installBanner">
  <span style="font-size:28px">📲</span>
  <p>添加到主屏幕，像 APP 一样使用</p>
  <button class="btn-install" id="btnInstall">安装</button>
  <button class="btn-close" onclick="el('installBanner').classList.remove('show')">✕</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Helpers ─────────────────────────────────────────────────
const el = id => document.getElementById(id);

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtNum(n) {
  if (n == null) return '-';
  if (n >= 10000) return (n/10000).toFixed(1) + 'w';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

function fmtDelta(n) {
  if (n == null) return '';
  const sign = n > 0 ? '+' : '';
  if (n >= 10000) return sign + (n/10000).toFixed(1) + 'w';
  if (n >= 1000) return sign + (n/1000).toFixed(1) + 'k';
  return sign + n;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}分钟前`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}小时前`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}天前`;
  return `${Math.floor(days/30)}月前`;
}

function showToast(msg) {
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── State ───────────────────────────────────────────────────
let data = null;
let currentTab = 'daily';
let currentLang = '';
let deferredPrompt = null;

// ─── PWA ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  el('installBanner').classList.add('show');
});

el('btnInstall').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') showToast('🎉 安装成功！');
    deferredPrompt = null;
    el('installBanner').classList.remove('show');
  }
});

// ─── Tab switching ───────────────────────────────────────────
el('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  el('tabs').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  render();
});

// ─── Language switching ──────────────────────────────────────
el('langBar').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn');
  if (!btn) return;
  el('langBar').querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLang = btn.dataset.lang;
  render();
});

// ─── Card click ──────────────────────────────────────────────
el('content').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (card && card.dataset.url) window.open(card.dataset.url, '_blank');
});

// ─── Load Data ───────────────────────────────────────────────
const DATA_URLS = [
  'data/summary.json',        // 当仓库有数据时
  'https://raw.githubusercontent.com/thisDy/github-trending/main/data/summary.json'  // fallback
];

async function loadData() {
  const btn = el('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = '⏳ 加载中';

  try {
    // Try cache first
    const cached = localStorage.getItem('gh_data');
    const cacheTime = localStorage.getItem('gh_data_time');
    if (cached && cacheTime && (Date.now() - cacheTime < 30 * 60 * 1000)) {
      data = JSON.parse(cached);
      render();
      updateMeta();
    }

    // Fetch fresh
    let fetched = null;
    for (const url of DATA_URLS) {
      try {
        const resp = await fetch(url, { cache: 'no-cache' });
        if (resp.ok) {
          fetched = await resp.json();
          break;
        }
      } catch {}
    }

    if (fetched && fetched.daily && fetched.daily.length > 0) {
      data = fetched;
      localStorage.setItem('gh_data', JSON.stringify(data));
      localStorage.setItem('gh_data_time', Date.now().toString());
      render();
      updateMeta();
      showToast('✅ 已更新');
    } else if (!cached) {
      el('content').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无数据<br><small>GitHub Actions 每天自动采集</small></p></div>';
    }
  } catch (err) {
    if (localStorage.getItem('gh_data')) {
      data = JSON.parse(localStorage.getItem('gh_data'));
      render();
      showToast('📡 网络不佳，显示缓存');
    } else {
      el('content').innerHTML = '<div class="empty"><div class="empty-icon">😵</div><p>加载失败，请检查网络</p></div>';
    }
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '🔄 刷新';
  }
}

// ─── Update Meta ─────────────────────────────────────────────
function updateMeta() {
  if (!data) return;

  // Stats
  el('statsBar').style.display = 'flex';
  el('statTotal').textContent = fmtNum(data.total);
  el('statUpdated').textContent = timeAgo(data.generated_at);
  el('statTopLang').textContent = (data.langs && data.langs[0]) || '-';

  // Update time
  const d = new Date(data.generated_at);
  const pad = n => String(n).padStart(2, '0');
  el('updateTime').textContent = `数据日期: ${data.date} · 更新于 ${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;

  // Language filter
  if (data.langs && data.langs.length > 0) {
    el('langBar').style.display = 'flex';
    const langBar = el('langBar');
    langBar.innerHTML = '<button class="lang-btn active" data-lang="">全部</button>';
    data.langs.forEach(lang => {
      langBar.innerHTML += `<button class="lang-btn" data-lang="${esc(lang)}">${esc(lang)}</button>`;
    });
  }
}

// ─── Render ──────────────────────────────────────────────────
function render() {
  if (!data) return;

  const tabData = {
    daily: data.daily || [],
    weekly: data.weekly || [],
    monthly: data.monthly || [],
    new: data.new || [],
  };

  let repos = tabData[currentTab] || [];

  // Language filter
  if (currentLang) {
    repos = repos.filter(r => r.l === currentLang);
  }

  if (repos.length === 0) {
    el('content').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>没有 ${currentLang ? currentLang + ' ' : ''}项目数据</p></div>`;
    return;
  }

  const deltaKey = { daily: 's1', weekly: 's7', monthly: 's30' }[currentTab];

  el('content').innerHTML = repos.map((r, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-n';
    const delta = r[deltaKey];
    const deltaStr = currentTab !== 'new' ? fmtDelta(delta) : '';
    const isNew = currentTab === 'new';
    const langColor = r.lc || '#64748b';

    return `
      <div class="card" data-url="${esc(r.u)}">
        <div class="card-rank ${rankClass}">#${rank}</div>
        <div class="card-main">
          <div class="card-header">
            <div class="card-name">${esc(r.n)}</div>
            ${deltaStr ? `<div class="card-delta">⭐ ${deltaStr}</div>` : ''}
            ${isNew ? `<div class="card-delta">🆕 ${fmtNum(r.s)}⭐</div>` : ''}
          </div>
          <div class="card-desc">${esc(r.d)}</div>
          <div class="card-meta">
            ${r.l ? `<span><span class="lang-dot" style="background:${esc(langColor)}"></span>${esc(r.l)}</span>` : ''}
            <span>⭐ ${fmtNum(r.s)}</span>
            <span>🍴 ${fmtNum(r.f)}</span>
            ${r.pa ? `<span>🕐 ${timeAgo(r.pa)}</span>` : ''}
          </div>
          ${r.t && r.t.length ? `<div class="card-topics">${r.t.map(t => `<span class="topic-tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ─── Init ────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
