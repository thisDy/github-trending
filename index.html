<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1816">
<meta name="color-scheme" content="dark">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<title>Trending</title>
<style>
/* ═══════════════════════════════════════════
   Design System — Swiss Minimal Dark
   ═══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* ── Layered Background (统一暗色，仅靠边框分层) ── */
  --canvas:    #161616;              /* 全局背景 · 纯深灰 */
  --surface-0: #1a1a1a;              /* 统计栏 · 几乎同色 */
  --surface-1: #1a1a1a;              /* 卡片 · 同色，靠边框 */
  --surface-2: #202020;              /* hover 态 · 极微变化 */

  /* ── Border ── */
  --border:    #2a2a2a;              /* 细灰描边 */
  --border-h:  rgba(212,168,83,0.22); /* hover 态 · 金光 */

  /* ── Text ── */
  --tx-1:      #f5f0e8;              /* 主标题 · 暖白 */
  --tx-2:      rgba(245,240,232,0.68); /* 描述文字 */
  --tx-3:      rgba(245,240,232,0.42); /* 元数据 */
  --tx-4:      rgba(245,240,232,0.24); /* 最暗辅助 */

  /* ── Accent (金色体系) ── */
  --accent:    #d4a853;              /* 主金色 */
  --accent-2:  #f0d78c;              /* 浅金 · 渐变终点 */
  --green:     #5ec269;

  /* ── Spacing (4px grid) ── */
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:20px; --s-6:24px; --s-8:32px;

  /* ── Typography ── */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', monospace;
  --text-xs:11px; --text-sm:13px; --text-base:14px; --text-lg:16px; --text-xl:20px; --text-2xl:24px;
  --leading:1.5; --leading-t:1.3;

  /* ── Radius ── */
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:18px; --r-full:100px;

  /* ── Motion ── */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --dur: 300ms;

  /* ── Shadow (微弱，仅用于浮层) ── */
  --sh-card: 0 1px 3px rgba(0,0,0,0.3);
  --sh-card-h: 0 4px 20px rgba(212,168,83,0.08), 0 2px 8px rgba(0,0,0,0.3);
  --sh-sheet: 0 -8px 40px rgba(0,0,0,0.5);
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #1a1816; color-scheme: dark; }
body {
  font-family: var(--font);
  background: var(--canvas);
  color: var(--tx-1);
  min-height: 100vh; line-height: var(--leading);
  -webkit-tap-highlight-color: transparent;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* ── Icon ── */
.i { width:16px;height:16px;display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round; }
.i-sm{width:14px;height:14px} .i-lg{width:18px;height:18px} .i-xl{width:22px;height:22px}

/* ═══════════════════════════════════════════
   Layout
   ═══════════════════════════════════════════ */
.shell { max-width:640px; margin:0 auto; padding:0 var(--s-5); }

/* ═══════════════════════════════════════════
   Header
   ═══════════════════════════════════════════ */
.header {
  position:sticky; top:0; z-index:100;
  background: rgba(26,24,22,0.80);
  backdrop-filter: saturate(150%) blur(20px);
  -webkit-backdrop-filter: saturate(150%) blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-wrap { max-width:640px; margin:0 auto; padding:var(--s-4) var(--s-5) 0; }
.header-bar { display:flex; align-items:center; justify-content:space-between; height:40px; }
.brand { font-size:var(--text-base); font-weight:700; color:var(--tx-1); letter-spacing:-0.02em; }
.brand-sub { color:var(--tx-3); font-weight:400; margin-left:4px; font-size:var(--text-sm); }
.toolbar { display:flex; gap:2px; }

.btn-icon {
  width:34px; height:34px; border:none; border-radius:var(--r-md);
  background:transparent; color:var(--tx-3);
  display:flex; align-items:center; justify-content:center;
  transition: color var(--dur) var(--ease), background var(--dur) var(--ease);
}
.btn-icon:hover { color:var(--tx-2); background:var(--surface-1); }
.btn-icon:active { background:var(--surface-2); }
.btn-icon.on { color:var(--tx-1); background:var(--surface-1); }

/* ── Search ── */
.search-row {
  max-height:0; overflow:hidden; opacity:0;
  transition: max-height var(--dur) var(--ease), opacity var(--dur) var(--ease), margin var(--dur) var(--ease);
  margin:0;
}
.search-row.open { max-height:56px; opacity:1; margin:var(--s-3) 0 0; }
.search-inner { display:flex; gap:var(--s-2); }
.search-input {
  flex:1; background:var(--surface-0); border:1px solid var(--border);
  color:var(--tx-1); border-radius:var(--r-md);
  padding:9px var(--s-3); font-size:var(--text-sm); font-family:inherit;
  outline:none; transition: border-color var(--dur) var(--ease);
}
.search-input::placeholder { color:var(--tx-4); }
.search-input:focus { border-color:var(--border-h); }
.search-cancel {
  background:none; border:none; color:var(--tx-3);
  font-size:var(--text-sm); padding:0 var(--s-1);
  transition: color var(--dur) var(--ease);
}
.search-cancel:hover { color:var(--tx-2); }

/* ── Tabs ── */
.tabs {
  display:flex; gap:0; margin-top:var(--s-3);
  border-bottom:1px solid var(--border);
}
.tab {
  flex:1; text-align:center; padding:var(--s-3) 0;
  background:transparent; border:none;
  font-size:var(--text-sm); font-weight:500;
  color:var(--tx-4); position:relative;
  transition: color var(--dur) var(--ease);
}
.tab:hover { color:var(--tx-3); }
.tab.on { color:var(--tx-1); }
.tab.on::after {
  content:''; position:absolute; bottom:-1px; left:24%; right:24%;
  height:2px; border-radius:1px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
}

/* ═══════════════════════════════════════════
   Language Chips
   ═══════════════════════════════════════════ */
.langs {
  display:flex; gap:var(--s-2); overflow-x:auto;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
  padding:var(--s-4) 0 var(--s-1);
}
.langs::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:5px var(--s-3);
  background:transparent; border:1px solid var(--border);
  border-radius:var(--r-full); color:var(--tx-3);
  font-size:var(--text-xs); font-weight:400;
  transition: all var(--dur) var(--ease); white-space:nowrap;
}
.chip:hover { border-color:var(--border-h); color:var(--tx-2); }
.chip.on {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color:#fff; border-color:transparent; font-weight:600;
}

/* ═══════════════════════════════════════════
   Stats (中间层级)
   ═══════════════════════════════════════════ */
.stats {
  display:grid; grid-template-columns:repeat(3,1fr); gap:1px;
  background:var(--border); border-radius:var(--r-lg);
  overflow:hidden; margin:var(--s-4) 0;
}
.stat {
  background:var(--surface-0);
  padding:var(--s-4) var(--s-3); text-align:center;
}
.stat-val {
  font-size:var(--text-xl); font-weight:800;
  color:var(--tx-1); letter-spacing:-0.04em;
  font-variant-numeric:tabular-nums;
  font-family: var(--font);
}
.stat-lbl {
  font-size:10px; color:var(--tx-3);
  margin-top:2px; letter-spacing:0.06em;
  text-transform:uppercase; font-weight:500;
}

/* ═══════════════════════════════════════════
   Notice
   ═══════════════════════════════════════════ */
.notice {
  background:var(--surface-0); border:1px solid var(--border);
  border-radius:var(--r-md); padding:var(--s-3) var(--s-4);
  margin-bottom:var(--s-3); font-size:var(--text-xs);
  color:var(--tx-3); line-height:1.6;
  display:flex; align-items:flex-start; gap:var(--s-2);
}
.notice .i { flex-shrink:0; margin-top:1px; color:var(--tx-4); }
.notice a { color:var(--tx-2); text-decoration:underline; text-underline-offset:2px; }
.notice a:hover { color:var(--tx-1); }

/* ═══════════════════════════════════════════
   Repo Card (最亮层级 · 从背景中浮出)
   ═══════════════════════════════════════════ */
.card {
  background:var(--surface-1);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:var(--s-5);
  margin-bottom:var(--s-2);
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), transform 150ms var(--ease);
  cursor:pointer;
}
.card:hover {
  background:var(--surface-2);
  border-color:var(--border-h);
  box-shadow:var(--sh-card-h);
}
.card:active { transform:scale(0.997); }

.card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--s-3); }
.card-body { flex:1; min-width:0; }
.card-name {
  font-size:var(--text-base); font-weight:700;
  color:#fff; letter-spacing:-0.015em;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.card-delta {
  font-size:var(--text-sm); font-weight:700;
  color:var(--green); white-space:nowrap;
  font-variant-numeric:tabular-nums; flex-shrink:0;
  font-family:var(--font);
}
.card-delta.dim { color:var(--tx-4); }

.card-desc {
  font-size:var(--text-sm); color:var(--tx-2);
  line-height:var(--leading); margin-top:5px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

.card-foot {
  display:flex; align-items:center; gap:var(--s-4);
  margin-top:var(--s-3); font-size:var(--text-xs); color:var(--tx-3);
}
.card-foot span { display:flex; align-items:center; gap:5px; white-space:nowrap; }
.card-foot .i { color:var(--tx-4); opacity:0.6; }
.card-rank {
  min-width:18px; font-size:var(--text-xs); font-weight:600;
  color:var(--tx-4); font-variant-numeric:tabular-nums;
}
.dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* ═══════════════════════════════════════════
   Detail Sheet
   ═══════════════════════════════════════════ */
.sheet-bg {
  position:fixed; inset:0; background:rgba(0,0,0,0.55);
  z-index:500; opacity:0; pointer-events:none;
  transition: opacity var(--dur) var(--ease);
}
.sheet-bg.show { opacity:1; pointer-events:auto; }

.sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--surface-1); border-radius:var(--r-xl) var(--r-xl) 0 0;
  z-index:501; transform:translateY(100%);
  transition: transform var(--dur) var(--ease);
  max-height:82vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
  box-shadow:var(--sh-sheet);
}
.sheet.show { transform:translateY(0); }

.sheet-handle { width:28px; height:3px; background:var(--border-h); border-radius:2px; margin:var(--s-3) auto 0; }
.sheet-body { padding:var(--s-5) var(--s-6) var(--s-8); max-width:640px; margin:0 auto; }

.sheet-title { font-size:var(--text-2xl); font-weight:800; letter-spacing:-0.03em; margin-bottom:var(--s-1); color:#fff; }
.sheet-desc { font-size:var(--text-sm); color:var(--tx-2); line-height:var(--leading); }

.sheet-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:var(--s-2);
  margin:var(--s-5) 0;
}
.sheet-cell {
  background:var(--canvas); border:1px solid var(--border);
  border-radius:var(--r-md); padding:var(--s-3) var(--s-2); text-align:center;
  transition: border-color var(--dur) var(--ease);
}
.sheet-cell:hover { border-color:var(--border-h); }
.sheet-cell-v {
  font-size:var(--text-lg); font-weight:800;
  letter-spacing:-0.02em; font-variant-numeric:tabular-nums;
}
.sheet-cell-v.up { color:var(--green); }
.sheet-cell-v.n { color:var(--tx-1); }
.sheet-cell-l {
  font-size:10px; color:var(--tx-3);
  margin-top:2px; letter-spacing:0.04em; text-transform:uppercase; font-weight:500;
}

.sheet-chart-lbl { font-size:var(--text-xs); font-weight:600; color:var(--tx-3); margin-bottom:var(--s-3); letter-spacing:0.04em; text-transform:uppercase; }
.sheet-chart {
  background:var(--canvas); border:1px solid var(--border);
  border-radius:var(--r-md); padding:var(--s-4);
  height:110px; display:flex; align-items:flex-end; gap:var(--s-2);
}
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end; }
.chart-bar {
  width:100%; border-radius:4px; opacity:0.1;
  background:var(--tx-1); transition:height 0.5s var(--ease);
}
.chart-bar.hot { opacity:0.7; }
.chart-bar-lbl { font-size:9px; color:var(--tx-4); letter-spacing:0.02em; }

.sheet-links { display:flex; gap:var(--s-2); margin-top:var(--s-5); }
.sheet-link {
  flex:1; text-align:center; padding:10px var(--s-3);
  background:var(--canvas); border:1px solid var(--border);
  border-radius:var(--r-md); color:var(--tx-2);
  font-size:var(--text-sm); font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:var(--s-1);
  transition: all var(--dur) var(--ease);
}
.sheet-link:hover { border-color:var(--border-h); color:var(--tx-1); }
.sheet-link.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color:#fff; border-color:transparent; font-weight:600;
}
.sheet-link.primary:hover { opacity:0.9; }

/* ═══════════════════════════════════════════
   Skeleton
   ═══════════════════════════════════════════ */
.skel { animation:shimmer 1.6s infinite; }
@keyframes shimmer { 0%,100%{opacity:0.2} 50%{opacity:0.45} }
.skel-card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r-lg); padding:var(--s-5); margin-bottom:var(--s-2); }
.skel-line { background:var(--surface-2); border-radius:4px; height:10px; margin-bottom:var(--s-2); }
.skel-w25{width:25%} .skel-w50{width:50%} .skel-w80{width:80%}

/* ═══════════════════════════════════════════
   Empty
   ═══════════════════════════════════════════ */
.empty { text-align:center; padding:60px var(--s-6); }
.empty .i { width:32px; height:32px; color:var(--tx-4); margin-bottom:var(--s-4); opacity:0.35; }
.empty-t { font-size:var(--text-sm); color:var(--tx-3); }
.empty-s { font-size:var(--text-xs); color:var(--tx-4); margin-top:var(--s-1); }

/* ═══════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════ */
.toast {
  position:fixed; top:68px; left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--tx-2); padding:7px var(--s-4); border-radius:var(--r-full);
  font-size:var(--text-xs); font-weight:500;
  opacity:0; pointer-events:none; z-index:600;
  transition: all var(--dur) var(--ease);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════
   PWA Install (auto-dismiss 8s)
   ═══════════════════════════════════════════ */
.pwa {
  position:fixed; bottom:var(--s-5); left:var(--s-4); right:var(--s-4);
  background:var(--surface-2); border:1px solid var(--border-h);
  border-radius:var(--r-lg); padding:var(--s-4) var(--s-5);
  z-index:200; max-width:380px; margin:0 auto;
  box-shadow:var(--sh-sheet);
  display:none; align-items:center; gap:var(--s-3);
  transform:translateY(20px); opacity:0;
  transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
}
.pwa.show { display:flex; transform:translateY(0); opacity:1; }
.pwa .i { color:var(--tx-3); flex-shrink:0; }
.pwa-text { flex:1; font-size:var(--text-sm); color:var(--tx-2); line-height:var(--leading-t); }
.pwa-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color:#fff; border:none;
  border-radius:var(--r-md); padding:8px var(--s-4);
  font-size:var(--text-xs); font-weight:600; flex-shrink:0;
  transition: opacity var(--dur) var(--ease);
}
.pwa-btn:hover { opacity:0.85; }
.pwa-close {
  background:none; border:none; color:var(--tx-4); padding:var(--s-1);
  transition: color var(--dur) var(--ease);
}
.pwa-close:hover { color:var(--tx-3); }

/* ═══════════════════════════════════════════
   Back to Top
   ═══════════════════════════════════════════ */
.top-btn {
  position:fixed; bottom:var(--s-6); right:var(--s-6);
  width:36px; height:36px; border-radius:50%;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--tx-3); display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; z-index:100;
  transition: all var(--dur) var(--ease);
  box-shadow:var(--sh-card);
}
.top-btn.show { opacity:1; pointer-events:auto; }
.top-btn:hover { color:var(--tx-1); border-color:var(--border-h); }

/* ═══════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════ */
@media(min-width:768px){
  .shell,.header-wrap,.sheet-body{max-width:700px}
  .stat-val{font-size:var(--text-2xl)}
  .card{padding:var(--s-5) var(--s-6)}
  .sheet-grid{gap:var(--s-3)}
  .sheet-cell{padding:var(--s-4)}
}
@media(min-width:1024px){
  .shell,.header-wrap,.sheet-body{max-width:760px}
}
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<div class="header">
  <div class="header-wrap">
    <div class="header-bar">
      <div class="brand">Trending<span class="brand-sub">/github</span></div>
      <div class="toolbar">
        <button class="btn-icon" id="btnSearch" onclick="toggleSearch()" aria-label="Search">
          <svg class="i" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="btn-icon" id="btnSort" onclick="toggleSort()" aria-label="Sort">
          <svg class="i" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M6 12h12"/><path d="M9 18h6"/></svg>
        </button>
        <button class="btn-icon" id="btnRefresh" onclick="loadData()" aria-label="Refresh">
          <svg class="i" viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
      </div>
    </div>
    <div class="search-row" id="searchRow">
      <div class="search-inner">
        <input class="search-input" id="searchInput" placeholder="Search repositories, languages..." oninput="onSearch()">
        <button class="search-cancel" onclick="toggleSearch()">Cancel</button>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="today">Today</button>
      <button class="tab" data-tab="week">This Week</button>
      <button class="tab" data-tab="month">This Month</button>
      <button class="tab" data-tab="rising">Rising</button>
    </div>
  </div>
</div>

<!-- ═══ Content ═══ -->
<div class="shell">
  <div class="langs" id="langRow"></div>
  <div class="stats" id="statsBar" style="display:none">
    <div class="stat"><div class="stat-val" id="sTotal">—</div><div class="stat-lbl">Tracked</div></div>
    <div class="stat"><div class="stat-val" id="sUpdated">—</div><div class="stat-lbl">Updated</div></div>
    <div class="stat"><div class="stat-val" id="sLang">—</div><div class="stat-lbl">Top Lang</div></div>
  </div>
  <div id="list">
    <div class="skel-card skel"><div class="skel-line skel-w25"></div><div class="skel-line skel-w80"></div><div class="skel-line skel-w50"></div></div>
    <div class="skel-card skel"><div class="skel-line skel-w25"></div><div class="skel-line skel-w80"></div><div class="skel-line skel-w50"></div></div>
    <div class="skel-card skel"><div class="skel-line skel-w25"></div><div class="skel-line skel-w80"></div><div class="skel-line skel-w50"></div></div>
  </div>
</div>

<!-- ═══ Detail Sheet ═══ -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body">
    <div class="sheet-title" id="shTitle">—</div>
    <div class="sheet-desc" id="shDesc">—</div>
    <div class="sheet-grid" id="shGrid"></div>
    <div class="sheet-chart-lbl">Growth</div>
    <div class="sheet-chart" id="shChart"></div>
    <div class="sheet-links" id="shLinks"></div>
  </div>
</div>

<!-- ═══ Back Top ═══ -->
<button class="top-btn" id="topBtn" onclick="scrollTo({top:0,behavior:'smooth'})" aria-label="Top">
  <svg class="i" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<!-- ═══ PWA Install (auto-dismiss 8s) ═══ -->
<div class="pwa" id="pwa">
  <svg class="i i-lg" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="m5 12 7 7 7-7"/></svg>
  <div class="pwa-text">Add to Home Screen for the full app experience</div>
  <button class="pwa-btn" id="pwaBtn">Install</button>
  <button class="pwa-close" onclick="dismissPwa()">
    <svg class="i i-sm" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };
const fmtN = n => { if(n==null)return'—'; if(n>=1e4)return(n/1e4).toFixed(1)+'w'; if(n>=1e3)return(n/1e3).toFixed(1)+'k'; return String(n); };
const fmtD = n => { if(n==null)return''; const p=n>0?'+':''; if(n>=1e4)return p+(n/1e4).toFixed(1)+'w'; if(n>=1e3)return p+(n/1e3).toFixed(1)+'k'; return p+n; };
const ago = iso => { if(!iso)return''; const m=Math.floor((Date.now()-new Date(iso).getTime())/6e4); if(m<60)return m+'m'; const h=Math.floor(m/60); if(h<24)return h+'h'; return Math.floor(h/24)+'d'; };
const toast = m => { const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); };

let data=null, tab='today', lang='', q='', asc=false, defer=null, hasDelta=false;
let pwaTimer=null;

/* ── PWA ── */
if('serviceWorker'in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); defer=e; showPwa(); });
function showPwa(){ const p=$('pwa'); p.classList.add('show'); if(pwaTimer)clearTimeout(pwaTimer); pwaTimer=setTimeout(dismissPwa,8000); }
function dismissPwa(){ const p=$('pwa'); p.style.transform='translateY(20px)'; p.style.opacity='0'; setTimeout(()=>{p.classList.remove('show');p.style.transform='';p.style.opacity='';},300); if(pwaTimer){clearTimeout(pwaTimer);pwaTimer=null;} }
$('pwaBtn').addEventListener('click', async()=>{ if(defer){defer.prompt();(await defer.userChoice).outcome==='accepted'&&toast('Installed');defer=null;dismissPwa();} });

/* ── Scroll ── */
window.addEventListener('scroll',()=>$('topBtn').classList.toggle('show',scrollY>500),{passive:true});

/* ── Tabs ── */
$('tabs').addEventListener('click',e=>{ const b=e.target.closest('.tab'); if(!b)return; $('tabs').querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); tab=b.dataset.tab; render(); });

/* ── Langs ── */
$('langRow').addEventListener('click',e=>{ const b=e.target.closest('.chip'); if(!b)return; $('langRow').querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); b.classList.add('on'); lang=b.dataset.l; render(); });

/* ── Search ── */
function toggleSearch(){ const r=$('searchRow'); r.classList.toggle('open'); $('btnSearch').classList.toggle('on'); if(r.classList.contains('open'))$('searchInput').focus(); else{q='';$('searchInput').value='';render();} }
function onSearch(){ q=$('searchInput').value.trim().toLowerCase(); render(); }

/* ── Sort ── */
function toggleSort(){ asc=!asc; $('btnSort').classList.toggle('on',asc); toast(asc?'Ascending':'Descending'); render(); }

/* ── Card → Sheet ── */
$('list').addEventListener('click',e=>{ const c=e.target.closest('.card'); if(!c)return; const r=findRepo(c.dataset.n); if(r)openSheet(r); });
function findRepo(n){ if(!data)return null; return[...(data.daily||[]),...(data.weekly||[]),...(data.monthly||[]),...(data.new||[])].find(r=>r.n===n); }

function openSheet(r){
  $('shTitle').textContent=r.n; $('shDesc').textContent=r.d||'No description';
  $('shGrid').innerHTML=[{v:fmtN(r.s),l:'Stars',c:''},{v:fmtN(r.f),l:'Forks',c:''},{v:r.s1!=null?fmtD(r.s1):'—',l:'Daily',c:r.s1>0?'up':'n'},{v:r.s7!=null?fmtD(r.s7):'—',l:'Weekly',c:r.s7>0?'up':'n'},{v:r.s30!=null?fmtD(r.s30):'—',l:'Monthly',c:r.s30>0?'up':'n'},{v:ago(r.pa)||'—',l:'Last Push',c:'n'}].map(d=>`<div class="sheet-cell"><div class="sheet-cell-v ${d.c}">${d.v}</div><div class="sheet-cell-l">${d.l}</div></div>`).join('');
  const bars=[{l:'Day',v:r.s1||0},{l:'Week',v:r.s7||0},{l:'Month',v:r.s30||0}]; const mx=Math.max(...bars.map(b=>Math.abs(b.v)),1);
  $('shChart').innerHTML=bars.map(b=>{const h=Math.max(3,(Math.abs(b.v)/mx)*75); return`<div class="chart-col"><div class="chart-bar${b.v>0?' hot':''}" style="height:${h}%"></div><div class="chart-bar-lbl">${b.l}</div></div>`;}).join('');
  $('shLinks').innerHTML=`<a class="sheet-link" href="${esc(r.u)}" target="_blank" rel="noopener"><svg class="i i-sm" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Repository</a>${r.hp?`<a class="sheet-link primary" href="${esc(r.hp)}" target="_blank" rel="noopener">Homepage</a>`:''}`;
  $('sheetBg').classList.add('show'); $('sheet').classList.add('show');
}
function closeSheet(){ $('sheetBg').classList.remove('show'); $('sheet').classList.remove('show'); }

/* ── Load ── */
async function loadData(){
  $('btnRefresh').classList.add('on');
  try{
    const c=localStorage.getItem('gh_data'), ct=localStorage.getItem('gh_data_t');
    if(c&&ct&&Date.now()-ct<30*60*1000){ data=JSON.parse(c); render(); meta(); }
    let r=null;
    for(const u of ['data/summary.json','https://raw.githubusercontent.com/thisDy/github-trending/main/data/summary.json']){
      try{const x=await fetch(u,{cache:'no-cache'});if(x.ok){r=await x.json();break;}}catch{}
    }
    if(r&&r.daily&&r.daily.length){ data=r; localStorage.setItem('gh_data',JSON.stringify(data)); localStorage.setItem('gh_data_t',Date.now()+''); render(); meta(); toast('Updated'); }
    else if(!c){ $('list').innerHTML='<div class="empty"><svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><div class="empty-t">No data yet</div><div class="empty-s">GitHub Actions collects daily</div></div>'; }
  }catch{
    if(localStorage.getItem('gh_data')){ data=JSON.parse(localStorage.getItem('gh_data')); render(); toast('Cached'); }
    else $('list').innerHTML='<div class="empty"><svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><div class="empty-t">Connection failed</div></div>';
  }finally{ setTimeout(()=>$('btnRefresh').classList.remove('on'),300); }
}

function meta(){
  if(!data)return;
  $('statsBar').style.display='grid';
  $('sTotal').textContent=fmtN(data.total); $('sUpdated').textContent=ago(data.generated_at); $('sLang').textContent=data.langs?.[0]||'—';
  if(data.langs?.length){ $('langRow').innerHTML='<button class="chip on" data-l="">All</button>'+data.langs.map(l=>`<button class="chip" data-l="${esc(l)}">${esc(l)}</button>`).join(''); }
}

function render(){
  if(!data)return;
  const src={today:data.daily||[],week:data.weekly||[],month:data.monthly||[],rising:data.new||[]};
  let repos=src[tab]||[];
  hasDelta=repos.some(r=>r.s1!=null&&r.s1!==0);
  if(lang)repos=repos.filter(r=>r.l===lang);
  if(q)repos=repos.filter(r=>(r.n?.toLowerCase().includes(q))||(r.d?.toLowerCase().includes(q))||(r.l?.toLowerCase().includes(q)));
  const dk={today:'s1',week:'s7',month:'s30',rising:'s30'}[tab];
  if(asc)repos=[...repos].sort((a,b)=>(a[dk]||0)-(b[dk]||0));
  const isRising=tab==='rising';

  let notice='';
  if(!hasDelta&&!isRising){ notice=`<div class="notice"><svg class="i i-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span>Showing total stars. Growth deltas appear after data collection runs for multiple days. <a href="https://github.com/thisDy/github-trending/actions" target="_blank" rel="noopener">Check Actions</a></span></div>`; }

  if(!repos.length){ $('list').innerHTML=`<div class="empty"><svg class="i" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><div class="empty-t">No results</div></div>`; return; }

  $('list').innerHTML=notice+repos.map((r,i)=>{
    const d=r[dk]; let dh;
    if(isRising)dh=`<div class="card-delta">${fmtN(r.s)}</div>`;
    else if(hasDelta&&d!=null&&d!==0)dh=`<div class="card-delta">${fmtD(d)}</div>`;
    else dh=`<div class="card-delta dim">${fmtN(r.s)}</div>`;
    return`<div class="card" data-n="${esc(r.n)}">
      <div class="card-head"><div class="card-body"><div class="card-name">${esc(r.n)}</div><div class="card-desc">${esc(r.d)}</div></div>${dh}</div>
      <div class="card-foot">
        <span class="card-rank">${i+1}</span>
        ${r.l?`<span><span class="dot" style="background:${esc(r.lc||'rgba(255,255,255,0.28)')}"></span>${esc(r.l)}</span>`:''}
        <span><svg class="i i-sm" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor" stroke="none"/></svg>${fmtN(r.s)}</span>
        <span><svg class="i i-sm" viewBox="0 0 24 24"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>${fmtN(r.f)}</span>
        ${r.pa?`<span><svg class="i i-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${ago(r.pa)}</span>`:''}
      </div></div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
